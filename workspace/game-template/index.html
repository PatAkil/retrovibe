<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retrovibe</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; height: 100%;
        background: #0b0b0f;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        overflow: hidden;
      }
      /* Arcade cabinet chrome around the screen. */
      #cabinet {
        height: 100%;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 14px;
        padding: 20px; box-sizing: border-box;
      }
      #marquee {
        color: #ffec27; letter-spacing: 0.35em; font-size: 13px;
        text-transform: uppercase; text-shadow: 0 0 8px rgba(255,236,39,0.5);
        user-select: none;
      }
      #bezel {
        padding: 18px; border-radius: 18px;
        background: linear-gradient(160deg, #23232c, #131318);
        box-shadow: inset 0 0 0 2px #34343f, 0 20px 60px rgba(0,0,0,0.6);
        max-width: 100%; max-height: 82vh;
      }
      /* The game module creates <canvas> and appends it here. */
      #screen {
        display: block; border-radius: 8px; overflow: hidden;
        background: #000; line-height: 0;
      }
      #screen canvas {
        display: block; image-rendering: pixelated;
        max-width: 100%; height: auto;
      }
      #hint {
        color: #5f574f; font-size: 11px; letter-spacing: 0.1em; user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="cabinet">
      <div id="marquee">▚ Retrovibe</div>
      <div id="bezel"><div id="screen"></div></div>
      <div id="hint">click the screen &amp; press a key to start</div>
    </div>
    <script type="module" src="/game/main.ts"></script>
  </body>
</html>
