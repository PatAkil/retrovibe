<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Retrovibe parent-frame harness</title>
    <style>
      body { font-family: ui-monospace, monospace; background: #101014; color: #e8e8ec; margin: 0; display: flex; height: 100vh; }
      #left { flex: 1; min-width: 0; display: flex; align-items: center; justify-content: center; }
      iframe { width: 96%; height: 92%; border: 2px solid #2a2a33; border-radius: 8px; background: #000; }
      #log { width: 380px; overflow-y: auto; border-left: 2px solid #2a2a33; padding: 10px; font-size: 12px; }
      #log h1 { font-size: 13px; color: #a78bfa; }
      .msg { margin: 4px 0; padding: 4px 6px; background: #17171d; border-radius: 4px; white-space: pre-wrap; word-break: break-all; }
      .bad { border-left: 3px solid #ff004d; }
    </style>
  </head>
  <body>
    <div id="left">
      <!-- The game under test — its runtime.ts detects the parent frame and posts here. -->
      <iframe id="game" src="http://localhost:5173/" allow="autoplay"></iframe>
    </div>
    <div id="log"><h1>messages from the game ↓</h1></div>
    <script>
      // Every retrovibe message is recorded verbatim for the verifier AND shown
      // on screen for a human. Messages from the game frame that do NOT match
      // the pinned envelope are recorded as violations.
      window.__messages = [];
      window.__violations = [];
      const VALID_TYPES = ['gameOver', 'scoreChanged', 'stateChanged'];
      const log = document.getElementById('log');
      window.addEventListener('message', (event) => {
        const d = event.data;
        const entry = document.createElement('div');
        entry.className = 'msg';
        if (d && d.source === 'retrovibe') {
          const envelopeOk =
            VALID_TYPES.includes(d.type) &&
            Object.keys(d).sort().join(',') === 'payload,source,type';
          if (envelopeOk) {
            window.__messages.push(d);
          } else {
            window.__violations.push(d);
            entry.className += ' bad';
          }
          entry.textContent = JSON.stringify(d);
          log.appendChild(entry);
        }
      });
    </script>
  </body>
</html>
